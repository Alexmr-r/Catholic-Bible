<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Catholic Bible Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e6b319",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1a160d",
                        "burgundy": "#5c1010",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Serif', serif;
        }
        .bg-bible-pattern {
            background-color: #1a160d;
            background-image: radial-gradient(circle at center, #2a2415 0%, #1a160d 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-[400px] flex flex-col items-center">
<!-- Central Branding -->
<div class="mb-12 flex flex-col items-center">
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 border border-primary/30 mb-6 group">
<span class="material-symbols-outlined text-primary text-6xl select-none" style="font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;">
                    menu_book
                </span>
<div class="absolute inset-0 flex items-center justify-center mt-[-8px]">
<span class="material-symbols-outlined text-primary text-4xl font-bold select-none">
                    church
                   </span>
</div>
<!-- Decorative glow -->
<div class="absolute inset-0 rounded-full bg-primary/5 blur-xl"></div>
</div>
<h1 class="text-2xl font-bold tracking-tight text-primary">Catholic Bible</h1>
<p class="text-slate-400 text-sm mt-1 italic">Vulgata Clementina</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-xs uppercase tracking-widest text-primary/70 font-medium ml-1">Email Address</label>
<div class="relative flex items-center group">
<div class="absolute left-4 text-primary/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-primary/5 border border-primary/20 rounded-lg py-4 pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="your@soul.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end px-1">
<label class="text-xs uppercase tracking-widest text-primary/70 font-medium">Password</label>
<a class="text-xs text-burgundy hover:text-red-400 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center group">
<div class="absolute left-4 text-primary/60 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-primary/5 border border-primary/20 rounded-lg py-4 pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-burgundy hover:bg-red-900 text-slate-100 font-bold py-4 rounded-lg shadow-lg shadow-black/40 transition-all active:scale-[0.98] mt-4 border border-burgundy/50">
                Login
            </button>
<!-- Secondary Actions -->
<div class="pt-8 text-center">
<p class="text-slate-500 text-sm">
                    New to the community? 
                    <a class="text-burgundy font-bold hover:underline ml-1" href="#">Register</a>
</p>
</div>
</div>
<!-- Subtle Footer Decoration -->
<div class="mt-16 opacity-20 flex items-center gap-4 w-full">
<div class="h-[1px] bg-primary/50 flex-1"></div>
<span class="material-symbols-outlined text-primary text-sm">flare</span>
<div class="h-[1px] bg-primary/50 flex-1"></div>
</div>
<!-- Background Image (Symbolic) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-bible-pattern"></div>
<div class="absolute top-0 left-0 w-full h-full opacity-[0.03] mix-blend-overlay" data-alt="Ancient parchment texture with subtle religious motifs" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBsgxvBhprrpmIHxkYLsO1ZTvEaFhGjmQ-zYHa8suYgVILxoNiLyy2E-v1UmVlk4BEqo4zxK-kCwHRl_iEtDHuC60xbFVpiA7PpJLGeon3yrjxngKP4tT5IgOJvv2TPdZ8flAPn_5KPtUobqlfnY_tbYd7KairAH4a7-4iVIspguX2_tPXms--wcJhzmsIn-4YMAgQjiPW1GsLrfolo_lBwWue8OlzYhO1CU2b-pKrrAZjbbwOqI9VK-TEHIuBlGY9awfBJ5gjOu-CO');">
</div>
</div>
</div>
</body></html>
