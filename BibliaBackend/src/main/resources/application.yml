# ====================================
# Application Configuration
# ====================================
spring:
  application:
    name: Biblia Católica API

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # AI Configuration
  ai:
    ollama:
      base-url: http://biblia-ollama:11434
      chat:
        options:
          model: llama3.2:1b
          temperature: 0.2

  # JPA Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false  # Deshabilitar validación estricta de checksums
    out-of-order: true            # Permitir migraciones fuera de orden

# ====================================
# Server Configuration
# ====================================
server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# ====================================
# JWT Configuration
# ====================================
jwt:
  secret: ${JWT_SECRET:c3VwZXJTZWNyZXRLZXlGb3JCaWJsaWFBcHBKV1QyMDI0VmVyeUxvbmdBbmRTZWN1cmU=}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

cors:
  allowed-origins: "*"

# ====================================
# Resend Email Configuration
# ====================================
resend:
  api-key: ${RESEND_API_KEY}
  from-email: catholicverse@getcatholicverse.com
  from-name: CatholicVerse

# ====================================
# OpenAPI Configuration
# ====================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ====================================
# Actuator Configuration
# ====================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ====================================
# Logging Configuration
# ====================================
logging:
  level:
    root: INFO
    com.bibliacatolica: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# ====================================
# Development Profile
# ====================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/biblia_db
    username: biblia_user
    password: biblia_secret_2024
    driver-class-name: org.postgresql.Driver

  ai:
    ollama:
      base-url: http://localhost:11434

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

---
# ====================================
# Docker Profile
# ====================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.bibliacatolica: INFO
    org.hibernate.SQL: WARN

---
# ====================================
# Production Profile
# ====================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.bibliacatolica: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

# STRICT PRODUCTION SECURITY
jwt:
  secret: ${JWT_SECRET} # No default fallback in PROD. Must be set by ENVs or it will crash.

cors:
  allowed-origins: "https://getcatholicverse.com,https://www.getcatholicverse.com,https://catholic-verse-admin.pages.dev,http://localhost:5173,http://localhost:3000"

