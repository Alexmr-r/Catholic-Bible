version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: biblia-postgres
    environment:
      POSTGRES_DB: biblia_db
      POSTGRES_USER: biblia_user
      POSTGRES_PASSWORD: biblia_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblia_user -d biblia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biblia-network

  # Ollama AI Server
  ollama:
    image: ollama/ollama:latest
    container_name: biblia-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - biblia-network
    restart: unless-stopped

  # Spring Boot API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblia-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biblia_db
      SPRING_DATASOURCE_USERNAME: biblia_user
      SPRING_DATASOURCE_PASSWORD: biblia_secret_2024
      JWT_SECRET: c3VwZXJTZWNyZXRLZXlGb3JCaWJsaWFBcHBKV1QyMDI0VmVyeUxvbmdBbmRTZWN1cmU=
      RESEND_API_KEY: ${RESEND_API_KEY}

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - biblia-network
    restart: unless-stopped

  # pgAdmin (opcional, para desarrollo)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: biblia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biblia.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - biblia-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  biblia-network:
    driver: bridge

