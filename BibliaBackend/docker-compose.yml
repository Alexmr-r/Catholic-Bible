version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: biblia-postgres
    environment:
      POSTGRES_DB: biblia_db
      POSTGRES_USER: ${POSTGRES_USER:-biblia_prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-una_contrasena_dificil_para_la_db_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblia_prod_user} -d biblia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biblia-network

  # Ollama AI Server (DESACTIVADO PARA AHORRAR RAM)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: biblia-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - biblia-network
  #   restart: unless-stopped

  # Spring Boot API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblia-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biblia_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-biblia_prod_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-una_contrasena_dificil_para_la_db_2026}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SPRING_AI_PROVIDER: ${SPRING_AI_PROVIDER:-cloudflare}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_AI_MODEL: ${CLOUDFLARE_AI_MODEL:-@cf/meta/llama-3.1-8b-instruct}
    ports:
      - "80:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - biblia-network
    restart: unless-stopped

  # pgAdmin (opcional, para desarrollo)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: biblia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biblia.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - biblia-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  biblia-network:
    driver: bridge
